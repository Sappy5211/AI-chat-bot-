<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ManualMind Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #202020;
      --panel: #303030;
      --panel-deep: #181818;
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.15);
      --text: #f6f6f6;
      --muted: #b8b8b8;
      --soft: #7b7b7b;
      --control: rgba(255, 255, 255, 0.08);
      --control-hover: rgba(255, 255, 255, 0.14);
      --accent: #ffffff;
      --accent-ink: #111111;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% -10%, rgba(255, 255, 255, 0.06), transparent 34rem),
        linear-gradient(180deg, #242424 0%, var(--page) 46%, #191919 100%);
      color: var(--text);
    }

    body.light-mode {
      color-scheme: light;
      --page: #f4f4f1;
      --panel: #ffffff;
      --panel-deep: #f0f0ed;
      --line: rgba(0, 0, 0, 0.1);
      --line-strong: rgba(0, 0, 0, 0.18);
      --text: #171717;
      --muted: #5f6368;
      --soft: #6f6f6f;
      --control: rgba(0, 0, 0, 0.06);
      --control-hover: rgba(0, 0, 0, 0.1);
      --accent: #171717;
      --accent-ink: #ffffff;
      background: #f4f4f1;
    }

    body.light-mode .app-layout {
      background:
        radial-gradient(circle at 62% 7%, rgba(0, 0, 0, 0.055), transparent 30rem),
        linear-gradient(180deg, #fbfbf8 0%, #f4f4f1 100%);
    }

    body.light-mode .main-pane {
      background: transparent;
    }

    body.light-mode .headline,
    body.light-mode .assistant-message,
    body.light-mode .status-line,
    body.light-mode .thinking-line,
    body.light-mode .final-message {
      color: #151515;
    }

    body.light-mode .composer,
    body.light-mode .user-bubble {
      background: #ffffff;
      color: #151515;
      box-shadow: 0 20px 54px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    body.light-mode .message-input {
      color: #151515;
    }

    body.light-mode .message-input::placeholder,
    body.light-mode .status-line {
      color: #666666;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      padding: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app-layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 408px minmax(0, 1fr);
      background:
        radial-gradient(circle at 62% 7%, rgba(255, 255, 255, 0.075), transparent 30rem),
        linear-gradient(180deg, #242424 0%, var(--page) 46%, #191919 100%);
    }

    .sidebar-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 68px 340px;
      background: #000000;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      border-top-right-radius: 18px;
      border-bottom-right-radius: 18px;
      overflow: hidden;
      box-shadow: 22px 0 80px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 5;
    }

    .sidebar-shell.collapsed {
      grid-template-columns: 68px 0;
    }

    .sidebar-shell.collapsed .detail-sidebar {
      width: 0;
      padding-left: 0;
      padding-right: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .icon-rail {
      min-height: 100vh;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 28px 12px 14px;
      background: #000000;
    }

    .brand-mark {
      width: 36px;
      height: 26px;
      margin-bottom: 24px;
      color: #ffffff;
    }

    .rail-button {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 11px;
      background: transparent;
      color: #bbbbbb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 170ms ease, color 170ms ease, transform 170ms ease;
    }

    .rail-button:hover,
    .rail-button.active {
      color: #ffffff;
      background: #2f2f2f;
    }

    .rail-button:active {
      transform: translateY(1px);
    }

    .rail-button svg,
    .sidebar-icon {
      width: 17px;
      height: 17px;
      stroke: currentColor;
    }

    .rail-spacer {
      flex: 1;
    }

    .profile-dot {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
    }

    .detail-sidebar {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 32px 18px 18px 16px;
      background: #000000;
      color: #ffffff;
      transition: width 190ms ease, padding 190ms ease, opacity 160ms ease;
    }

    .sidebar-brand {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .sidebar-brand svg {
      width: 26px;
      height: 18px;
    }

    .sidebar-heading-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .sidebar-heading {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 720;
    }

    .sidebar-collapse {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #a8a8a8;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .sidebar-collapse:hover {
      background: #1f1f1f;
      color: #ffffff;
    }

    .sidebar-collapse svg {
      width: 16px;
      height: 16px;
      transform: rotate(-90deg);
    }

    .sidebar-search {
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      color: #ffffff;
      background: #000000;
    }

    .sidebar-search:focus-within {
      border-color: rgba(255, 255, 255, 0.32);
    }

    .sidebar-search svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .sidebar-search input {
      min-width: 0;
      flex: 1;
      border: 0;
      outline: 0;
      background: transparent;
      color: #ffffff;
      font-size: 14px;
    }

    .sidebar-search input::placeholder {
      color: #a8a8a8;
    }

    .sidebar-content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-right: 2px;
      scrollbar-width: thin;
      scrollbar-color: #2f2f2f transparent;
    }

    .sidebar-section {
      margin-bottom: 28px;
    }

    .sidebar-section-title {
      color: #9a9a9a;
      font-size: 14px;
      line-height: 20px;
      margin: 0 0 12px;
      padding-left: 16px;
    }

    .sidebar-item,
    .sidebar-subitem {
      width: 100%;
      min-height: 42px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px 0 16px;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      transition: background 160ms ease, color 160ms ease;
    }

    .sidebar-item:hover,
    .sidebar-item.selected,
    .sidebar-subitem:hover,
    .sidebar-subitem.selected {
      background: #1f1f1f;
    }

    .sidebar-item svg:first-child,
    .sidebar-subitem svg:first-child {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .item-label {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .chevron {
      width: 15px;
      height: 15px;
      transition: transform 170ms ease;
    }

    .sidebar-item.expanded .chevron {
      transform: rotate(180deg);
    }

    .submenu {
      display: none;
      padding: 2px 0 7px 30px;
    }

    .submenu.open {
      display: block;
    }

    .sidebar-subitem {
      color: #cfcfcf;
      min-height: 36px;
      padding-left: 14px;
      font-size: 13px;
    }

    .sidebar-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      padding-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .announcement-card {
      flex: 0 0 auto;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: #f6f6f6;
      color: #111111;
      padding: 13px 12px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      margin-top: auto;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease;
      margin-left: 8px;
      margin-right: 8px;
      margin-bottom: 10px;
      max-height: 118px;
      overflow: hidden;
    }

    .announcement-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.38);
    }

    .announcement-ping,
    .announcement-dot {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 17px;
      height: 17px;
      border-radius: 999px;
      background: #3b82f6;
    }

    .announcement-ping {
      animation: ping 1.45s cubic-bezier(0, 0, 0.2, 1) infinite;
      opacity: 0.75;
    }

    @keyframes ping {
      75%,
      100% {
        transform: scale(1.75);
        opacity: 0;
      }
    }

    .announcement-title {
      margin: 0 0 5px;
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 650;
    }

    .announcement-card:hover .announcement-title {
      color: #111111;
    }

    .announcement-description {
      margin: 0;
      color: #7b7b86;
      font-size: 12px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .announcement-footer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      color: #6b7280;
      font-size: 11px;
      transition: max-height 180ms ease, opacity 180ms ease, margin-top 180ms ease;
    }

    .announcement-card:hover .announcement-footer,
    .announcement-card.expanded .announcement-footer {
      max-height: 28px;
      opacity: 1;
      margin-top: 10px;
    }

    .announcement-footer button {
      border: 0;
      background: transparent;
      color: #4b5563;
      padding: 0;
      cursor: pointer;
      font: inherit;
      text-decoration: underline;
    }

    .sidebar-avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .footer-name {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      color: #ffffff;
    }

    .footer-email {
      display: block;
      margin-top: 2px;
      color: #8d8d8d;
      font-size: 12px;
      line-height: 1.1;
    }

    .footer-more {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 9px;
      color: #ffffff;
      background: transparent;
      cursor: pointer;
    }

    .footer-more:hover {
      background: #1f1f1f;
    }

    .chat-meta {
      display: block;
      margin-top: 2px;
      color: #777777;
      font-size: 11px;
      line-height: 1.2;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .app-layout {
      grid-template-columns: 260px minmax(0, 1fr);
    }

    .app-layout.sidebar-closed {
      grid-template-columns: 52px minmax(0, 1fr);
    }

    .app-layout.sidebar-closed .sidebar-shell {
      transform: none;
      width: 52px;
      border-right-color: rgba(255, 255, 255, 0.12);
    }

    .sidebar-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 0;
      width: 260px;
      background: #000000;
      border-right: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 0;
      overflow: hidden;
      box-shadow: none;
      transition: transform 180ms ease, border-color 180ms ease;
    }

    .sidebar-topbar {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }

    .sidebar-product {
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .panel-toggle,
    .sidebar-reopen {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #d8d8d8;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .panel-toggle:hover,
    .sidebar-reopen:hover {
      background: #1f1f1f;
      color: #ffffff;
    }

    .panel-toggle svg,
    .sidebar-reopen svg {
      width: 18px;
      height: 18px;
    }

    .sidebar-reopen {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      display: none;
      background: #050505;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .sidebar-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 0 8px 12px;
      scrollbar-width: thin;
      scrollbar-color: #2f2f2f transparent;
    }

    .sidebar-primary {
      display: grid;
      gap: 4px;
      margin: 4px 0 22px;
    }

    .chatgpt-button,
    .chatgpt-row,
    .chat-history-item {
      width: 100%;
      min-height: 38px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      transition: background 140ms ease;
    }

    .chatgpt-button:hover,
    .chatgpt-button.active,
    .chatgpt-row:hover,
    .chat-history-item:hover,
    .chat-history-item.selected {
      background: #2f2f2f;
    }

    .chatgpt-button svg,
    .chatgpt-row svg,
    .chat-history-item svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .sidebar-group {
      margin: 18px 0;
    }

    .sidebar-group-trigger {
      width: 100%;
      height: 32px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-group-trigger:hover {
      background: #151515;
    }

    .sidebar-group-trigger svg {
      width: 14px;
      height: 14px;
      transition: transform 150ms ease;
    }

    .sidebar-group.collapsed .sidebar-group-trigger svg {
      transform: rotate(-90deg);
    }

    .sidebar-group-content {
      display: grid;
      gap: 2px;
      margin-top: 6px;
      max-height: min(260px, 34vh);
      overflow-y: auto;
      padding-right: 2px;
      scrollbar-width: thin;
      scrollbar-color: #2f2f2f transparent;
    }

    [data-group="chats"] .sidebar-group-content {
      max-height: min(330px, 40vh);
    }

    .sidebar-group.collapsed .sidebar-group-content {
      display: none;
    }

    .history-title {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .sidebar-user {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 60px;
      padding: 10px 14px 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .theme-toggle {
      flex: 0 0 auto;
      width: calc(100% - 16px);
      min-height: 38px;
      margin: 0 8px 10px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 14px;
      text-align: left;
    }

    .theme-toggle:hover {
      background: #2f2f2f;
    }

    .theme-toggle svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .collapsed-rail {
      display: none;
      min-height: 100vh;
      width: 52px;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 14px 8px 16px;
      background: #000000;
    }

    .collapsed-rail .panel-toggle {
      margin-bottom: 14px;
    }

    .collapsed-rail-spacer {
      flex: 1;
    }

    .collapsed-dot {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #8b5cf6;
      color: #ffffff;
      font-size: 10px;
    }

    .app-layout.sidebar-closed .sidebar-topbar,
    .app-layout.sidebar-closed .sidebar-scroll,
    .app-layout.sidebar-closed .theme-toggle,
    .app-layout.sidebar-closed .announcement-card,
    .app-layout.sidebar-closed .sidebar-user {
      display: none;
    }

    .app-layout.sidebar-closed .collapsed-rail {
      display: flex;
    }

    .user-initials {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #8b5cf6;
      color: #ffffff;
      font-size: 11px;
      flex: 0 0 auto;
    }

    .user-copy {
      min-width: 0;
      flex: 1;
      display: grid;
      gap: 2px;
      color: #ffffff;
      font-size: 14px;
      line-height: 1.1;
    }

    .user-copy span:last-child {
      color: #c5c5c5;
      font-size: 12px;
    }

    .main-pane {
      min-width: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 24px;
    }

    .main-pane.chat-active {
      place-items: stretch;
      padding: 46px 24px 24px;
    }

    .chat-shell {
      width: min(100%, 920px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 34px;
      transition: min-height 220ms ease, justify-content 220ms ease;
    }

    .main-pane.chat-active .chat-shell {
      min-height: calc(100vh - 70px);
      justify-content: space-between;
      align-items: center;
      margin: 0 auto;
      gap: 24px;
    }

    .chat-transcript {
      width: min(100%, 760px);
      display: none;
      flex: 1;
      margin: 0 auto;
      padding-top: 8px;
    }

    .main-pane.chat-active .chat-transcript {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .main-pane.chat-active .headline,
    .main-pane.chat-active .suggestions {
      display: none;
    }

    .main-pane.chat-active .composer-wrap {
      margin-top: auto;
      margin-bottom: 4px;
    }

    .main-pane.chat-active .composer {
      min-height: 50px;
      border-radius: 999px;
      padding: 10px 12px;
      gap: 4px;
    }

    .main-pane.chat-active .message-input {
      min-height: 24px;
      padding: 2px 8px 0;
    }

    .main-pane.chat-active .composer-actions {
      min-height: 32px;
    }

    .user-bubble {
      max-width: min(520px, 76%);
      align-self: flex-end;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      padding: 12px 16px;
      font-size: 15px;
      line-height: 1.45;
    }

    .assistant-flow {
      display: grid;
      gap: 18px;
      max-width: 760px;
    }

    .assistant-message,
    .final-message {
      color: #ffffff;
      font-size: 15px;
      line-height: 1.65;
    }

    .response-actions {
      display: none;
      align-items: center;
      gap: 10px;
      position: relative;
      margin-top: -6px;
      color: #ffffff;
    }

    .response-actions.show {
      display: flex;
    }

    .response-action {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: currentColor;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
    }

    .response-action:hover,
    .response-action.active {
      background: rgba(255, 255, 255, 0.12);
    }

    .response-action svg {
      width: 18px;
      height: 18px;
    }

    .sources-action {
      width: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 6px;
      font-size: 13px;
      font-weight: 650;
    }

    .source-badges {
      display: inline-flex;
      align-items: center;
      margin-right: 2px;
    }

    .source-badge {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid #050505;
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 10px;
      font-weight: 800;
      margin-left: -4px;
    }

    .source-badge:first-child {
      margin-left: 0;
      background: #2f8cff;
    }

    .source-badge:last-child {
      background: #ef4444;
    }

    .retry-popover {
      position: absolute;
      left: 122px;
      bottom: 34px;
      width: 250px;

      color: #151515;
    }
    }

    .voice-bars span:nth-child(5n) {

      height: 18px;

      background: rgba(0, 0, 0, 0.38);

      background: rgba(0, 0, 0, 0.08);

      color: #ffffff;

    }

      font-size: 14px;

    .action-button:active {

    .action-button svg {

      height: 20px;

    }

    .tools-button {

      color: #ffffff;
    }

    .right-actions {
      margin-left: auto;
      display: flex;
      align-items: center;

    }

      color: #f4f4f4;
    }

    }

      justify-content: center;
      gap: 6px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      color: #f4f4f4;
      cursor: pointer;
      padding: 0 8px 0 12px;

      font-size: 14px;
      font-weight: 650;
      white-space: nowrap;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;

    .model-button:hover,
    .model-button.open {
      background: rgba(255, 255, 255, 0.18);

    .model-button:active {

    .model-button svg {
      width: 18px;
      height: 18px;
      opacity: 0.76;
      transition: transform 180ms ease;
    }

    .model-button.open svg {
      transform: rotate(180deg);
    }

    .model-menu {
      position: absolute;
      right: 0;
      bottom: 46px;
      width: min(260px, calc(100vw - 36px));
      display: none;
      padding: 8px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.085);
      background: #1f1f1f;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
      z-index: 4;

    .model-menu.open {
      display: block;
      animation: menu-in 140ms ease both;
    }

    @keyframes menu-in {
      from {
        opacity: 0;
        transform: translateY(5px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .model-option,
    .more-models {
      width: 100%;

      gap: 12px;

      text-align: left;
      cursor: pointer;
      transition: background 150ms ease;

    .model-option:hover,

    }

      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .model-name {
      color: #eeeeee;
      font-size: 13px;
      font-weight: 720;
      line-height: 1.15;
    }

    .model-description {
      color: #9b9b9b;
      font-size: 12px;
      line-height: 1.2;
    }

      height: 18px;

      color: #5fa7ff;

    .chip {

      height: 17px;
      color: #cfcfcf;

    .tool-menu {

    .tool-menu button svg {

      height: 17px;
      flex: 0 0 auto;
    }

    .tool-menu .tool-chevron {
      margin-left: auto;

      height: 14px;
      opacity: 0.8;
    }

    .tool-divider {
      height: 1px;
      margin: 7px 14px;
      background: rgba(255, 255, 255, 0.12);
    }

    .preview {
      display: none;
      width: fit-content;
      max-width: 100%;
      align-items: center;
      gap: 8px;

      font-size: 13px;

    .preview button {
      border: 0;
      background: transparent;
      color: #ffffff;
      cursor: pointer;
      width: 20px;
      height: 20px;
      border-radius: 999px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      .app-layout {
        grid-template-columns: 1fr;
      }

      .sidebar-shell {
        position: fixed;
        inset: 0 auto 0 0;
        width: 260px;
        transition: transform 200ms ease;
      }

      .app-layout.sidebar-closed {
        grid-template-columns: 52px minmax(0, 1fr);
      }

        padding: 82px 16px 28px 86px;
      }

      .composer {
        min-height: 122px;

        padding: 16px 14px 12px;

        border-radius: 27px;
      }

      .suggestions {
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 2px;
      }

      .chip {
        flex: 0 0 auto;
      }
    }
  </style>

    }

    function stopRecording(accept) {
      if (!isRecording) return;
      isRecording = false;
      clearInterval(recordingTimer);
      recordingTimer = null;
      composer.classList.remove("recording");
      micButton.classList.remove("active");

      if (recognition) {
        try {
          recognition.stop();
        } catch (_error) {}
      }

      if (accept) {
        const fallback = recordingSeconds > 1
          ? "Please use this voice note as my next prompt."
          : "Voice prompt captured.";
        textarea.value = dictatedText || fallback;
        resizeTextarea();
        updateSendState();
        textarea.focus();
      }

      dictatedText = "";
      recognition = null;
      recordingSeconds = 0;
      recordTime.textContent = "00:00";
    }

    micButton.addEventListener("click", startRecording);
    acceptVoice.addEventListener("click", () => stopRecording(true));
    discardVoice.addEventListener("click", () => stopRecording(false));

    textarea.addEventListener("input", () => {
      resizeTextarea();
      updateSendState();
    });

    textarea.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    attachButton.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      fileName.textContent = file.name;
      filePreview.classList.add("show");
      updateSendState();
    });

    removeFile.addEventListener("click", () => {
      fileInput.value = "";
      fileName.textContent = "";
      filePreview.classList.remove("show");
      updateSendState();
    });

    toolsButton.addEventListener("click", () => {
      const isOpen = toolMenu.classList.toggle("open");
      toolsButton.setAttribute("aria-expanded", String(isOpen));
      modelMenu.classList.remove("open");
      modelButton.classList.remove("open");
      modelButton.setAttribute("aria-expanded", "false");
    });

    modelButton.addEventListener("click", () => {
      const isOpen = modelMenu.classList.toggle("open");
      modelButton.classList.toggle("open", isOpen);
      modelButton.setAttribute("aria-expanded", String(isOpen));
      toolMenu.classList.remove("open");
      toolsButton.setAttribute("aria-expanded", "false");
    });

    modelOptions.forEach((option) => {
      option.addEventListener("click", () => {
        const model = option.dataset.model;
        selectedModelLabel.textContent = model;
        modelOptions.forEach((item) => {
          const selected = item === option;
          item.classList.toggle("selected", selected);
          item.setAttribute("aria-checked", String(selected));
        });
        modelMenu.classList.remove("open");
        modelButton.classList.remove("open");
        modelButton.setAttribute("aria-expanded", "false");
      });
    });

    document.addEventListener("click", (event) => {
      if (!toolMenu.contains(event.target) && !toolsButton.contains(event.target)) {
        toolMenu.classList.remove("open");
        toolsButton.setAttribute("aria-expanded", "false");
      }
      if (!modelMenu.contains(event.target) && !modelButton.contains(event.target)) {
        modelMenu.classList.remove("open");
        modelButton.classList.remove("open");
        modelButton.setAttribute("aria-expanded", "false");
      }
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      if (!textarea.value.trim() && fileInput.files.length === 0) return;
      const submittedPrompt = textarea.value.trim() || "Uploaded file";
      renderAssistantFlow(submittedPrompt);
      textarea.value = "";
      fileInput.value = "";
      fileName.textContent = "";
      filePreview.classList.remove("show");
      resizeTextarea();
      updateSendState();
    });

    resizeTextarea();
    updateSendState();
    textarea.focus();
  </script>
</body>
</html>
