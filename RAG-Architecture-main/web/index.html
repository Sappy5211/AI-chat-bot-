<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ManualMind Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #202020;
      --panel: #303030;
      --panel-deep: #181818;
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.15);
      --text: #f6f6f6;
      --muted: #b8b8b8;
      --soft: #7b7b7b;
      --control: rgba(255, 255, 255, 0.08);
      --control-hover: rgba(255, 255, 255, 0.14);
      --accent: #ffffff;
      --accent-ink: #111111;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% -10%, rgba(255, 255, 255, 0.06), transparent 34rem),
        linear-gradient(180deg, #242424 0%, var(--page) 46%, #191919 100%);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      padding: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app-layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 408px minmax(0, 1fr);
      background:
        radial-gradient(circle at 62% 7%, rgba(255, 255, 255, 0.075), transparent 30rem),
        linear-gradient(180deg, #242424 0%, var(--page) 46%, #191919 100%);
    }

    .sidebar-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 68px 340px;
      background: #000000;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      border-top-right-radius: 18px;
      border-bottom-right-radius: 18px;
      overflow: hidden;
      box-shadow: 22px 0 80px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 5;
    }

    .sidebar-shell.collapsed {
      grid-template-columns: 68px 0;
    }

    .sidebar-shell.collapsed .detail-sidebar {
      width: 0;
      padding-left: 0;
      padding-right: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .icon-rail {
      min-height: 100vh;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 28px 12px 14px;
      background: #000000;
    }

    .brand-mark {
      width: 36px;
      height: 26px;
      margin-bottom: 24px;
      color: #ffffff;
    }

    .rail-button {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 11px;
      background: transparent;
      color: #bbbbbb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 170ms ease, color 170ms ease, transform 170ms ease;
    }

    .rail-button:hover,
    .rail-button.active {
      color: #ffffff;
      background: #2f2f2f;
    }

    .rail-button:active {
      transform: translateY(1px);
    }

    .rail-button svg,
    .sidebar-icon {
      width: 17px;
      height: 17px;
      stroke: currentColor;
    }

    .rail-spacer {
      flex: 1;
    }

    .profile-dot {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
    }

    .detail-sidebar {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 32px 18px 18px 16px;
      background: #000000;
      color: #ffffff;
      transition: width 190ms ease, padding 190ms ease, opacity 160ms ease;
    }

    .sidebar-brand {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .sidebar-brand svg {
      width: 26px;
      height: 18px;
    }

    .sidebar-heading-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .sidebar-heading {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 720;
    }

    .sidebar-collapse {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #a8a8a8;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .sidebar-collapse:hover {
      background: #1f1f1f;
      color: #ffffff;
    }

    .sidebar-collapse svg {
      width: 16px;
      height: 16px;
      transform: rotate(-90deg);
    }

    .sidebar-search {
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      color: #ffffff;
      background: #000000;
    }

    .sidebar-search:focus-within {
      border-color: rgba(255, 255, 255, 0.32);
    }

    .sidebar-search svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .sidebar-search input {
      min-width: 0;
      flex: 1;
      border: 0;
      outline: 0;
      background: transparent;
      color: #ffffff;
      font-size: 14px;
    }

    .sidebar-search input::placeholder {
      color: #a8a8a8;
    }

    .sidebar-content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-right: 2px;
      scrollbar-width: thin;
      scrollbar-color: #2f2f2f transparent;
    }

    .sidebar-section {
      margin-bottom: 28px;
    }

    .sidebar-section-title {
      color: #9a9a9a;
      font-size: 14px;
      line-height: 20px;
      margin: 0 0 12px;
      padding-left: 16px;
    }

    .sidebar-item,
    .sidebar-subitem {
      width: 100%;
      min-height: 42px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px 0 16px;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      transition: background 160ms ease, color 160ms ease;
    }

    .sidebar-item:hover,
    .sidebar-item.selected,
    .sidebar-subitem:hover,
    .sidebar-subitem.selected {
      background: #1f1f1f;
    }

    .sidebar-item svg:first-child,
    .sidebar-subitem svg:first-child {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .item-label {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .chevron {
      width: 15px;
      height: 15px;
      transition: transform 170ms ease;
    }

    .sidebar-item.expanded .chevron {
      transform: rotate(180deg);
    }

    .submenu {
      display: none;
      padding: 2px 0 7px 30px;
    }

    .submenu.open {
      display: block;
    }

    .sidebar-subitem {
      color: #cfcfcf;
      min-height: 36px;
      padding-left: 14px;
      font-size: 13px;
    }

    .sidebar-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      padding-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .announcement-card {
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: #f6f6f6;
      color: #111111;
      padding: 13px 12px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      margin-top: auto;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .announcement-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.38);
    }

    .announcement-ping,
    .announcement-dot {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 17px;
      height: 17px;
      border-radius: 999px;
      background: #3b82f6;
    }

    .announcement-ping {
      animation: ping 1.45s cubic-bezier(0, 0, 0.2, 1) infinite;
      opacity: 0.75;
    }

    @keyframes ping {
      75%,
      100% {
        transform: scale(1.75);
        opacity: 0;
      }
    }

    .announcement-title {
      margin: 0 0 5px;
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 650;
    }

    .announcement-card:hover .announcement-title {
      color: #111111;
    }

    .announcement-description {
      margin: 0;
      color: #7b7b86;
      font-size: 12px;
      line-height: 1.35;
    }

    .announcement-footer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      color: #6b7280;
      font-size: 11px;
      transition: max-height 180ms ease, opacity 180ms ease, margin-top 180ms ease;
    }

    .announcement-card:hover .announcement-footer,
    .announcement-card.expanded .announcement-footer {
      max-height: 28px;
      opacity: 1;
      margin-top: 10px;
    }

    .announcement-footer button {
      border: 0;
      background: transparent;
      color: #4b5563;
      padding: 0;
      cursor: pointer;
      font: inherit;
      text-decoration: underline;
    }

    .sidebar-avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .footer-name {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      color: #ffffff;
    }

    .footer-email {
      display: block;
      margin-top: 2px;
      color: #8d8d8d;
      font-size: 12px;
      line-height: 1.1;
    }

    .footer-more {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 9px;
      color: #ffffff;
      background: transparent;
      cursor: pointer;
    }

    .footer-more:hover {
      background: #1f1f1f;
    }

    .chat-meta {
      display: block;
      margin-top: 2px;
      color: #777777;
      font-size: 11px;
      line-height: 1.2;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .main-pane {
      min-width: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 24px;
    }

    .chat-shell {
      width: min(100%, 920px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 34px;
    }

    .headline {
      margin: 0;
      font-size: clamp(32px, 4vw, 46px);
      font-weight: 650;
      line-height: 1.05;
      letter-spacing: 0;
      color: #ffffff;
      text-align: center;
      text-wrap: balance;
    }

    .composer-wrap {
      width: min(100%, 760px);
      position: relative;
    }

    .composer-wrap::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 31px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.035) 38%, rgba(255, 255, 255, 0.12));
      pointer-events: none;
      z-index: 0;
    }

    .composer {
      position: relative;
      z-index: 1;
      min-height: 112px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 42%),
        var(--panel);
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      padding: 18px 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-input {
      width: 100%;
      min-height: 44px;
      max-height: 190px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 16px;
      line-height: 1.45;
      padding: 4px 4px 0;
      overflow: hidden;
    }

    .message-input::placeholder {
      color: #d8d8d8;
      opacity: 0.9;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
    }

    .action-button {
      border: 0;
      outline: 0;
      height: 36px;
      min-width: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease, transform 160ms ease;
      font: inherit;
      font-size: 14px;
      white-space: nowrap;
    }

    .action-button:hover {
      background: var(--control-hover);
    }

    .action-button:active {
      transform: translateY(1px);
    }

    .action-button svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    .tools-button {
      padding: 0 12px 0 10px;
      color: #ffffff;
    }

    .right-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mic-button {
      color: #f4f4f4;
    }

    .model-selector {
      position: relative;
    }

    .model-button {
      height: 36px;
      border: 0;
      outline: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.12);
      color: #f4f4f4;
      cursor: pointer;
      padding: 0 8px 0 12px;
      font: inherit;
      font-size: 14px;
      font-weight: 650;
      white-space: nowrap;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .model-button:hover,
    .model-button.open {
      background: rgba(255, 255, 255, 0.18);
      color: #ffffff;
    }

    .model-button:active {
      transform: translateY(1px);
    }

    .model-button svg {
      width: 18px;
      height: 18px;
      opacity: 0.76;
      transition: transform 180ms ease;
    }

    .model-button.open svg {
      transform: rotate(180deg);
    }

    .model-menu {
      position: absolute;
      right: 0;
      bottom: 46px;
      width: min(260px, calc(100vw - 36px));
      display: none;
      padding: 8px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.085);
      background: #1f1f1f;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
      z-index: 4;
    }

    .model-menu.open {
      display: block;
      animation: menu-in 140ms ease both;
    }

    @keyframes menu-in {
      from {
        opacity: 0;
        transform: translateY(5px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .model-option,
    .more-models {
      width: 100%;
      min-height: 58px;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 12px;
      padding: 9px 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 150ms ease;
    }

    .model-option:hover,
    .more-models:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .model-copy {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .model-name {
      color: #eeeeee;
      font-size: 13px;
      font-weight: 720;
      line-height: 1.15;
    }

    .model-description {
      color: #9b9b9b;
      font-size: 12px;
      line-height: 1.2;
    }

    .model-check {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      color: #5fa7ff;
      opacity: 0;
    }

    .model-option.selected .model-check {
      opacity: 1;
    }

    .model-divider {
      height: 1px;
      margin: 6px 8px;
      background: rgba(255, 255, 255, 0.08);
    }

    .more-models {
      min-height: 44px;
      color: #eeeeee;
      font-size: 13px;
      font-weight: 720;
    }

    .more-models svg {
      width: 16px;
      height: 16px;
      color: #8f8f8f;
      transform: rotate(-90deg);
    }

    .send-button {
      background: rgba(255, 255, 255, 0.18);
      color: #ffffff;
    }

    .send-button.ready {
      background: var(--accent);
      color: var(--accent-ink);
    }

    .send-button.ready:hover {
      background: #e8e8e8;
    }

    .suggestions {
      width: min(100%, 760px);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .chip {
      height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted);
      padding: 0 15px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .chip:hover {
      color: #ffffff;
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.09);
      transform: translateY(-1px);
    }

    .chip svg {
      width: 17px;
      height: 17px;
      color: #cfcfcf;
    }

    .tool-menu {
      position: absolute;
      left: 54px;
      bottom: 55px;
      width: 240px;
      display: none;
      padding: 7px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #2b2b2b;
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.42);
      z-index: 3;
    }

    .tool-menu.open {
      display: block;
    }

    .tool-menu button {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 11px;
      display: flex;
      align-items: center;
      gap: 10px;
      font: inherit;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }

    .tool-menu button:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .preview {
      display: none;
      width: fit-content;
      max-width: 100%;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--muted);
      padding: 7px 10px;
      font-size: 13px;
    }

    .preview.show {
      display: inline-flex;
    }

    .preview button {
      border: 0;
      background: transparent;
      color: #ffffff;
      cursor: pointer;
      width: 20px;
      height: 20px;
      border-radius: 999px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      .app-layout {
        grid-template-columns: 1fr;
      }

      .sidebar-shell {
        position: fixed;
        inset: 0 auto 0 0;
        width: min(88vw, 408px);
        transform: translateX(calc(-100% + 68px));
        transition: transform 200ms ease;
      }

      .sidebar-shell:hover,
      .sidebar-shell:focus-within {
        transform: translateX(0);
      }

      .main-pane {
        align-items: start;
        padding: 82px 16px 28px 86px;
      }

      .chat-shell {
        gap: 28px;
      }

      .composer {
        min-height: 122px;
        border-radius: 26px;
        padding: 16px 14px 12px;
      }

      .composer-wrap::before {
        border-radius: 27px;
      }

      .suggestions {
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 2px;
      }

      .chip {
        flex: 0 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar-shell" aria-label="Workspace navigation">
      <nav class="icon-rail" aria-label="Primary sections">
        <svg class="brand-mark" viewBox="0 0 36 24" fill="none" aria-hidden="true">
          <path d="M1 4.5h34v7H1zM1 12.5h34v7H1z" fill="currentColor"/>
          <path d="M8 8h20M8 16h20" stroke="#000" stroke-width="3"/>
        </svg>

        <button class="rail-button" type="button" id="sideTabsToggle" aria-label="Collapse side tabs" title="Collapse side tabs">
          <svg viewBox="0 0 24 24" fill="none"><path d="M15 6 9 12l6 6" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 5v14" stroke-width="1.7" stroke-linecap="round"/></svg>
        </button>

        <button class="rail-button" type="button" data-section="dashboard" aria-label="Dashboard">
          <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="6" height="6" stroke-width="1.5"/><rect x="14" y="5" width="6" height="6" stroke-width="1.5"/><rect x="4" y="15" width="6" height="4" stroke-width="1.5"/><rect x="14" y="15" width="6" height="4" stroke-width="1.5"/></svg>
        </button>
        <button class="rail-button active" type="button" data-section="chats" aria-label="Chats">
          <svg viewBox="0 0 24 24" fill="none"><path d="M9 7h7M9 12h7M9 17h5" stroke-width="1.5" stroke-linecap="round"/><path d="m5 7 .8.8L7.5 6M5 12l.8.8L7.5 11M5 17l.8.8L7.5 16" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>

        <button class="rail-button" type="button" data-section="projects" aria-label="Projects">

    const dismissAnnouncement = document.getElementById("dismissAnnouncement");
    let activeSection = "chats";
    let activeSidebarItem = "";
    const expandedSidebarItems = new Set();

    function renderSidebar() {
      const data = sidebarData[activeSection] || sidebarData.chats;
      const query = sidebarSearch.value.trim().toLowerCase();
      sidebarTitle.textContent = data.title;
      railButtons.forEach((button) => button.classList.toggle("active", button.dataset.section === activeSection));

      const sections = data.sections.map((section, sectionIndex) => {
        const items = section.items.filter((item) => {
          if (!query) return true;
          const childMatch = (item.children || []).some((child) => child.toLowerCase().includes(query));
          const metaMatch = (item.meta || "").toLowerCase().includes(query);
          return item.label.toLowerCase().includes(query) || metaMatch || childMatch || section.title.toLowerCase().includes(query);
        });
        if (!items.length) return "";

        const itemHtml = items.map((item, itemIndex) => {
          const key = `${activeSection}-${sectionIndex}-${itemIndex}`;
          const hasChildren = Array.isArray(item.children) && item.children.length > 0;
          const expanded = expandedSidebarItems.has(key);
          const selected = activeSidebarItem === key;
          const submenu = hasChildren ? `<div class="submenu ${expanded ? "open" : ""}">${item.children.map((child) => `<button class="sidebar-subitem" type="button" data-child="${child}"><span class="item-label">${child}</span></button>`).join("")}</div>` : "";
          return `
            <div class="sidebar-row">
              <button class="sidebar-item ${selected ? "selected" : ""} ${expanded ? "expanded" : ""}" type="button" data-key="${key}" data-dropdown="${hasChildren}" data-label="${item.label}" data-action="${item.action ? "true" : "false"}">
                ${iconSvg[item.icon] || iconSvg.file}
                <span class="item-label">${item.label}${item.meta ? `<span class="chat-meta">${item.meta}</span>` : ""}</span>
                ${hasChildren ? iconSvg.chevron : ""}
              </button>
              ${submenu}
            </div>
          `;
        }).join("");

        return `<section class="sidebar-section"><p class="sidebar-section-title">${section.title}</p>${itemHtml}</section>`;
      }).join("");

      sidebarContent.innerHTML = sections || `<section class="sidebar-section"><p class="sidebar-section-title">No matches</p></section>`;

      Array.from(sidebarContent.querySelectorAll(".sidebar-item")).forEach((button) => {
        button.addEventListener("click", () => {
          const key = button.dataset.key;
          const hasDropdown = button.dataset.dropdown === "true";
          const label = button.dataset.label;
          activeSidebarItem = key;
          if (button.dataset.action === "true" && label === "New chat") {
            const history = sidebarData.chats.sections[1].items;
            const count = history.length + 1;
            history.unshift({
              icon: "chat",
              label: `Untitled chat ${count}`,
              meta: "Just now • Draft",
              children: ["New conversation started"]
            });
            activeSidebarItem = "chats-1-0";
          }
          if (hasDropdown) {
            if (expandedSidebarItems.has(key)) expandedSidebarItems.delete(key);
            else expandedSidebarItems.add(key);
          }
          renderSidebar();
        });
      });

      Array.from(sidebarContent.querySelectorAll(".sidebar-subitem")).forEach((button) => {
        button.addEventListener("click", () => {
          activeSidebarItem = button.dataset.child;
          button.classList.add("selected");
        });
      });
    }

    railButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeSection = button.dataset.section;
        activeSidebarItem = "";
        sidebarSearch.value = "";
        expandedSidebarItems.clear();
        sidebarShell.classList.remove("collapsed");
        renderSidebar();
      });
    });

    sidebarSearch.addEventListener("input", renderSidebar);
    function toggleSidebarTabs() {
      const collapsed = sidebarShell.classList.toggle("collapsed");
      sideTabsToggle.setAttribute("aria-label", collapsed ? "Expand side tabs" : "Collapse side tabs");
      sideTabsToggle.title = collapsed ? "Expand side tabs" : "Collapse side tabs";
    }

    sidebarCollapse.addEventListener("click", toggleSidebarTabs);
    sideTabsToggle.addEventListener("click", toggleSidebarTabs);
    announcementCard.addEventListener("click", () => announcementCard.classList.toggle("expanded"));
    announcementCard.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        announcementCard.classList.toggle("expanded");
      }
    });
    dismissAnnouncement.addEventListener("click", (event) => {
      event.stopPropagation();
      announcementCard.style.display = "none";
    });
    document.querySelector(".footer-more").addEventListener("click", (event) => {
      event.currentTarget.textContent = event.currentTarget.textContent === "..." ? "Done" : "...";
    });

    renderSidebar();

    const textarea = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const form = document.getElementById("chatForm");
    const attachButton = document.getElementById("attachButton");
    const fileInput = document.getElementById("fileInput");
    const filePreview = document.getElementById("filePreview");
    const fileName = document.getElementById("fileName");
    const removeFile = document.getElementById("removeFile");
    const toolsButton = document.getElementById("toolsButton");
    const toolMenu = document.getElementById("toolMenu");
    const modelButton = document.getElementById("modelButton");
    const modelMenu = document.getElementById("modelMenu");
    const selectedModelLabel = document.getElementById("selectedModelLabel");
    const modelOptions = Array.from(document.querySelectorAll(".model-option"));

    function resizeTextarea() {
      textarea.style.height = "auto";
      textarea.style.height = `${Math.min(textarea.scrollHeight, 190)}px`;
    }

    function updateSendState() {
      sendButton.classList.toggle("ready", textarea.value.trim().length > 0 || fileInput.files.length > 0);
    }

    textarea.addEventListener("input", () => {
      resizeTextarea();
      updateSendState();
    });

    textarea.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    attachButton.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      fileName.textContent = file.name;
      filePreview.classList.add("show");
      updateSendState();
    });

    removeFile.addEventListener("click", () => {
      fileInput.value = "";
      fileName.textContent = "";
      filePreview.classList.remove("show");
      updateSendState();
    });

    toolsButton.addEventListener("click", () => {
      const isOpen = toolMenu.classList.toggle("open");
      toolsButton.setAttribute("aria-expanded", String(isOpen));
      modelMenu.classList.remove("open");
      modelButton.classList.remove("open");
      modelButton.setAttribute("aria-expanded", "false");
    });

    modelButton.addEventListener("click", () => {
      const isOpen = modelMenu.classList.toggle("open");
      modelButton.classList.toggle("open", isOpen);
      modelButton.setAttribute("aria-expanded", String(isOpen));
      toolMenu.classList.remove("open");
      toolsButton.setAttribute("aria-expanded", "false");
    });

    modelOptions.forEach((option) => {
      option.addEventListener("click", () => {
        const model = option.dataset.model;
        selectedModelLabel.textContent = model;
        modelOptions.forEach((item) => {
          const selected = item === option;
          item.classList.toggle("selected", selected);
          item.setAttribute("aria-checked", String(selected));
        });
        modelMenu.classList.remove("open");
        modelButton.classList.remove("open");
        modelButton.setAttribute("aria-expanded", "false");
      });
    });

    document.addEventListener("click", (event) => {
      if (!toolMenu.contains(event.target) && !toolsButton.contains(event.target)) {
        toolMenu.classList.remove("open");
        toolsButton.setAttribute("aria-expanded", "false");
      }
      if (!modelMenu.contains(event.target) && !modelButton.contains(event.target)) {
        modelMenu.classList.remove("open");
        modelButton.classList.remove("open");
        modelButton.setAttribute("aria-expanded", "false");
      }
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      if (!textarea.value.trim() && fileInput.files.length === 0) return;
      textarea.value = "";
      fileInput.value = "";
      fileName.textContent = "";
      filePreview.classList.remove("show");
      resizeTextarea();
      updateSendState();
    });

    resizeTextarea();
    updateSendState();
    textarea.focus();
  </script>
</body>
</html>
